version: '3.8'

services:
  # ==========================================
  # MySQL Database Service
  # ==========================================
  db:
    image: mysql:8.0
    container_name: hrms-db
    restart: always
    environment:
      MYSQL_DATABASE: hrms_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-change_me_in_env}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-change_me_in_env}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hrms-network

  # ==========================================
  # Spring Boot Backend Service
  # ==========================================
  backend:
    build:
      context: ./backend/hrms
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://db:3306/hrms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-change_me_in_env}
      JAVA_OPTS: ${JAVA_OPTS:-"-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"}
      JWT_SECRET: ${JWT_SECRET:-hrms_super_secret_key_at_least_256_bits_long_for_hs256_algorithm_2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@hrms.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
      SEED_HR_EMAIL: ${SEED_HR_EMAIL:-hr@hrms.com}
      SEED_HR_PASSWORD: ${SEED_HR_PASSWORD:-Hr@12345}
      SEED_EMPLOYEE_EMAIL: ${SEED_EMPLOYEE_EMAIL:-emp@hrms.com}
      SEED_EMPLOYEE_PASSWORD: ${SEED_EMPLOYEE_PASSWORD:-Emp@12345}
    ports:
      - "8080:8080"
    networks:
      - hrms-network

  # ==========================================
  # Next.js Frontend Service
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    restart: always
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - hrms-network

volumes:
  mysql_data:
    name: hrms_mysql_data

networks:
  hrms-network:
    name: hrms_network
    driver: bridge
