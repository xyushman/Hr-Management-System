# HRMS Backend - Local Profile Configuration (using H2 database with MySQL compatibility mode)
spring.application.name=hrms-backend
server.port=${PORT:${BACKEND_PORT:8080}}

# H2 Database in MySQL Mode (saves to ./data/hrms_db file inside the project directory so data is preserved across restarts)
spring.datasource.url=${H2_DATASOURCE_URL:jdbc:h2:file:./data/hrms_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE;MODE=MySQL}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=${JWT_SECRET:hrms_super_secret_key_at_least_256_bits_long_for_hs256_algorithm_2024}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Azure Active Directory (SSO) - DISABLED until real values are added
spring.cloud.azure.active-directory.enabled=${AZURE_AD_ENABLED:false}

# File Upload Limits
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
spring.servlet.multipart.enabled=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# OTP Expiry (minutes)
app.otp.expiry=${OTP_EXPIRY:10}

# Initial Data Seeder Configuration (overridable via environment variables)
seed.admin.email=${SEED_ADMIN_EMAIL:admin@hrms.com}
seed.admin.password=${SEED_ADMIN_PASSWORD:Admin@123}
seed.hr.email=${SEED_HR_EMAIL:hr@hrms.com}
seed.hr.password=${SEED_HR_PASSWORD:Hr@12345}
seed.employee.email=${SEED_EMPLOYEE_EMAIL:emp@hrms.com}
seed.employee.password=${SEED_EMPLOYEE_PASSWORD:Emp@12345}
