# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=xxxxxxxxxxxxxxxxxxxxxxx // here when we need to forgot the password so we need to mention your mail id so we can get the otp for this mailid
spring.mail.password=xxxxxxxxxxxxxxx  // here go for google account security so we need to generate the password once we mention the app name
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# OTP Expiry (minutes)
app.otp.expiry=10