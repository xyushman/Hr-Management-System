
# HRMS Backend - Application Configuration

# HRMS Backend - Application Configuration

spring.application.name=hrms-backend
server.port=${PORT:${BACKEND_PORT:8080}}

# Activate local profile by default (using H2 embedded DB with MySQL compatibility mode since MySQL is not running locally)
# To use external MySQL, comment out the line below:
#spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hrms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# JWT Configuration
jwt.secret=${JWT_SECRET:hrms_super_secret_key_at_least_256_bits_long_for_hs256_algorithm_2024}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}


# Azure Active Directory (SSO) - DISABLED until real values are added
spring.cloud.azure.active-directory.enabled=${AZURE_AD_ENABLED:false}


# File Upload Limits (default is only 1MB, increased here)
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
spring.servlet.multipart.enabled=true


# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method


# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Mention your mail ID to send OTPs for forgot password requests
spring.mail.username=${MAIL_USERNAME:}
# Generate app-specific password from Google account security
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# OTP Expiry (minutes)
app.otp.expiry=${OTP_EXPIRY:10}