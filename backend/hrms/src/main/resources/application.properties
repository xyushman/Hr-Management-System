
# HRMS Backend - Application Configuration

# HRMS Backend - Application Configuration

spring.application.name=hrms-backend
server.port=${PORT:${BACKEND_PORT:8080}}

# Activate local profile by default (using H2 embedded DB with MySQL compatibility mode since MySQL is not running locally)
# To use external MySQL, comment out the line below:
#spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# MySQL / TiDB Database & High-Performance Connection Pool (HikariCP)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hrms_db?useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&rewriteBatchedStatements=true&useConfigs=maxPerformance}
spring.datasource.username=root
spring.datasource.password=madhan@2103
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false

# Fix JSON Serialization of Java Time (LocalDate/LocalTime)
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
jwt.secret=${JWT_SECRET:hrms_super_secret_key_at_least_256_bits_long_for_hs256_algorithm_2024}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}


# Azure Active Directory (SSO) - DISABLED until real values are added
spring.cloud.azure.active-directory.enabled=${AZURE_AD_ENABLED:false}


# File Upload Limits (default is only 1MB, increased here)
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}
spring.servlet.multipart.enabled=true


# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method


# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Mention your mail ID to send OTPs for forgot password requests
spring.mail.username=nagireddymadhan355@gmail.com
# Generate app-specific password from Google account security
spring.mail.password=cjna stje hips xnxs
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# OTP Expiry (minutes)
app.otp.expiry=${OTP_EXPIRY:10}

