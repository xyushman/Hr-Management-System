
# HRMS Backend - Application Configuration

spring.application.name=hrms-backend
server.port=8080


# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/hrms_db
spring.datasource.username=root
spring.datasource.password=hussain@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# JWT Configuration

jwt.secret=hrms_super_secret_key_at_least_256_bits_long_for_hs256_algorithm_2024
jwt.expiration=86400000
jwt.refresh-expiration=604800000


# Azure Active Directory (SSO) - DISABLED until real values are added

spring.cloud.azure.active-directory.enabled=false


# File Upload Limits (default is only 1MB, increased here)

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true


# Swagger / OpenAPI

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method


# Mail (Outlook / SMTP) - Optional

spring.mail.host=smtp.office365.com
spring.mail.port=587
spring.mail.username=your-email@yourdomain.com
spring.mail.password=your-email-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true