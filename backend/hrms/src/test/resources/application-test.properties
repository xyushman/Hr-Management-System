# HRMS Backend - Test Profile Configuration (in-memory H2 database for automated tests)
spring.application.name=hrms-backend
server.port=0

# H2 In-Memory Database for testing
spring.datasource.url=jdbc:h2:mem:hrms_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration for testing
jwt.secret=hrms_super_secret_test_key_at_least_256_bits_long_for_hs256_algorithm_2024
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Email Configuration (disabled / mock properties for tests)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Seed Data settings for test profile
seed.admin.email=admin@hrms.com
seed.admin.password=Admin@123
seed.hr.email=hr@hrms.com
seed.hr.password=Hr@12345
seed.employee.email=emp@hrms.com
seed.employee.password=Emp@12345
